<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="48" font-size="28" font-weight="700" fill="#1E1B4B">Decision Memory — Architecture</text>
  <text x="40" y="76" font-size="15" fill="#475569">Custom engine agent (Microsoft 365 Agents SDK) · runs in Copilot Chat free + Teams · no Microsoft 365 Copilot license required</text>

  <!-- ====== Column 1: Surfaces ====== -->
  <text x="40" y="130" font-size="13" font-weight="700" fill="#64748B" letter-spacing="1">SURFACES</text>

  <rect x="40" y="148" width="240" height="78" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="160" y="180" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">Microsoft 365 Copilot Chat</text>
  <text x="160" y="202" font-size="12.5" fill="#16A34A" font-weight="600" text-anchor="middle">free tier — no Copilot license</text>

  <rect x="40" y="252" width="240" height="78" rx="10" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="160" y="284" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">Microsoft Teams</text>
  <text x="160" y="306" font-size="12.5" fill="#64748B" text-anchor="middle">personal · team · group chat</text>

  <rect x="40" y="356" width="240" height="78" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="160" y="388" font-size="15" font-weight="600" fill="#0F172A" text-anchor="middle">M365 Agents Playground</text>
  <text x="160" y="410" font-size="12.5" fill="#16A34A" font-weight="600" text-anchor="middle">local demo — zero credentials</text>

  <!-- Arrows surfaces -> agent host -->
  <line x1="280" y1="187" x2="356" y2="240" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="280" y1="291" x2="356" y2="291" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="280" y1="395" x2="356" y2="340" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="318" y="276" font-size="12" fill="#64748B" text-anchor="middle">Activities</text>

  <!-- Streamed reply back to Copilot (keeps the synchronous turn open) -->
  <line x1="358" y1="198" x2="282" y2="176" stroke="#6366F1" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="320" y="166" font-size="11" font-weight="600" fill="#6366F1" text-anchor="middle">streamed reply</text>

  <!-- ====== Column 2: Agent host ====== -->
  <rect x="360" y="110" width="440" height="540" rx="14" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="580" y="140" font-size="15" font-weight="700" fill="#312E81" text-anchor="middle">Agent host — Node :3978</text>

  <rect x="384" y="160" width="392" height="64" rx="8" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="1.5"/>
  <text x="580" y="186" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">M365 Agents SDK</text>
  <text x="580" y="206" font-size="12" fill="#64748B" text-anchor="middle">AgentApplication · POST /api/messages · streamed responses</text>

  <line x1="580" y1="224" x2="580" y2="248" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="384" y="250" width="392" height="92" rx="8" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2"/>
  <text x="580" y="276" font-size="14.5" font-weight="700" fill="#312E81" text-anchor="middle">Orchestrator</text>
  <text x="580" y="296" font-size="12" fill="#475569" text-anchor="middle">LLM ⇄ tool-calling loop · max 6 steps · tool-error recovery</text>
  <text x="580" y="314" font-size="12" font-weight="600" fill="#B45309" text-anchor="middle">confirm-before-write enforced in code</text>
  <text x="580" y="332" font-size="12" fill="#475569" text-anchor="middle">cites DR-ids · short conversation memory (recent turns)</text>

  <line x1="478" y1="342" x2="478" y2="368" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="682" y1="342" x2="682" y2="368" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="384" y="370" width="186" height="84" rx="8" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="1.5"/>
  <text x="477" y="396" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">LLM client</text>
  <text x="477" y="416" font-size="12" fill="#64748B" text-anchor="middle">Azure OpenAI (tool calling)</text>
  <text x="477" y="434" font-size="12" fill="#16A34A" text-anchor="middle">or offline FakeLlm</text>

  <rect x="590" y="370" width="186" height="84" rx="8" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="1.5"/>
  <text x="683" y="392" font-size="13.5" font-weight="600" fill="#0F172A" text-anchor="middle">Reply renderer</text>
  <text x="683" y="414" font-size="11" fill="#64748B" text-anchor="middle">Markdown · decision / conflict / list</text>
  <text x="683" y="431" font-size="11" fill="#64748B" text-anchor="middle">Teams / Copilot Chat surfaces</text>
  <text x="683" y="448" font-size="11" fill="#64748B" text-anchor="middle">built from data, never LLM JSON</text>

  <line x1="580" y1="342" x2="580" y2="498" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="384" y="500" width="392" height="64" rx="8" fill="#FFFFFF" stroke="#A5B4FC" stroke-width="1.5"/>
  <text x="580" y="526" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">MCP client</text>
  <text x="580" y="546" font-size="12" fill="#64748B" text-anchor="middle">Streamable HTTP · in-process fallback if server is down</text>

  <!-- Arrow agent -> MCP server -->
  <line x1="776" y1="532" x2="876" y2="532" stroke="#4F46E5" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="826" y="520" font-size="12" font-weight="600" fill="#4F46E5" text-anchor="middle">MCP · JSON-RPC</text>

  <!-- ====== Column 3: MCP server ====== -->
  <rect x="880" y="110" width="360" height="540" rx="14" fill="#FAF5FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="1060" y="142" font-size="16" font-weight="700" fill="#4C1D95" text-anchor="middle">Decision Memory MCP server — :3979</text>

  <rect x="904" y="160" width="312" height="56" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="1060" y="184" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">Streamable HTTP transport</text>
  <text x="1060" y="202" font-size="12" fill="#64748B" text-anchor="middle">POST /mcp · works with MCP Inspector too</text>

  <line x1="1060" y1="216" x2="1060" y2="240" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="904" y="242" width="312" height="202" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1060" y="268" font-size="14" font-weight="700" fill="#4C1D95" text-anchor="middle">6 tools</text>
  <text x="920" y="292" font-size="12.5" fill="#334155">▸ search_decisions — ranked full-text search</text>
  <text x="920" y="314" font-size="12.5" fill="#334155">▸ get_decision — full record + supersession links</text>
  <text x="920" y="336" font-size="12.5" fill="#334155">▸ list_decisions — by area / status</text>
  <text x="920" y="358" font-size="12.5" font-weight="600" fill="#B45309">▸ find_conflicting_decisions — proposal vs.</text>
  <text x="932" y="376" font-size="12.5" font-weight="600" fill="#B45309">standing decisions, with match reasons</text>
  <text x="920" y="398" font-size="12.5" fill="#334155">▸ create_decision — draft, rejects duplicates</text>
  <text x="920" y="420" font-size="12.5" fill="#334155">▸ update_decision_status — accept / reject drafts</text>

  <line x1="1060" y1="444" x2="1060" y2="464" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="904" y="466" width="312" height="88" rx="8" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="1060" y="490" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">DecisionStore</text>
  <text x="1060" y="510" font-size="12" fill="#64748B" text-anchor="middle">search scoring · conflict heuristics</text>
  <text x="1060" y="528" font-size="12" fill="#64748B" text-anchor="middle">(tag + keyword overlap + status weight)</text>
  <text x="1060" y="546" font-size="12" fill="#64748B" text-anchor="middle">seed JSON + runtime: local file or Azure Blob</text>

  <!-- Footer note -->
  <text x="40" y="688" font-size="13" fill="#64748B">Swap the JSON store for SharePoint / Dataverse / a database without touching the agent — the MCP boundary is the contract.</text>
  <rect x="40" y="470" width="240" height="34" rx="17" fill="#16A34A"/>
  <text x="160" y="492" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">No M365 Copilot license</text>
</svg>
